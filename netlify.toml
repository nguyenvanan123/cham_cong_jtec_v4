[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/chamcong run build"
  publish = "artifacts/chamcong/dist/public"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10"
  NODE_ENV = "production"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
