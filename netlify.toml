[build]
  # Lệnh build: truyền PORT=3000 (chỉ dùng lúc dev, không ảnh hưởng file tĩnh)
  # và BASE_PATH=/ để Vite biết đường dẫn gốc
  command = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/chamcong run build"

  # Thư mục chứa file tĩnh sau khi build xong
  publish = "artifacts/chamcong/dist/public"

# SPA redirect: tất cả route đều trả về index.html (cần cho Wouter)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  # Phiên bản Node.js — phải >= 20
  NODE_VERSION = "20"
  # pnpm sẽ được cài tự động qua corepack
  PNPM_VERSION = "9"
