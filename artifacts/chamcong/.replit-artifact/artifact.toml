kind = "web"
  previewPath = "/"
  title = "Hệ Thống Chấm Công"
  version = "1.0.0"
  id = "artifacts/chamcong"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 5173

  [services.development]
  run = "pnpm --filter @workspace/chamcong run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/chamcong", "run", "build" ]
  publicDir = "artifacts/chamcong/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "5173"
  BASE_PATH = "/"
